name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Remove debug signing config
        run: sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Create .env file
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/app-debug.apk'
